# AWS Amplify Hosting — Next.js 16 (HANDOFF step 7)
# Connect repo branch `main` in Amplify Console (us-west-2).
# Set env vars in Console (do not commit secrets). AWS self-hosted Supabase:
#   SUPABASE_INTERNAL_URL=http://<EC2_IP>:8000
#   NEXT_PUBLIC_SUPABASE_URL=https://<amplify-app>/supabase
#   NEXT_PUBLIC_SUPABASE_ANON_KEY=<from EC2 /opt/choice-supabase/.env>
#   NEXT_PUBLIC_AUTH_*_ENABLED
# See infra/aws/DEPLOYMENT.md and scripts/update-amplify-env.ps1

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Amplify exposes console env vars at build time but NOT to the SSR
        # runtime (Lambda). Write the server-only vars into .env.production so
        # Next.js loads them at runtime. NEXT_PUBLIC_* are inlined at build and
        # don't need to be here.
        - env | grep -E '^(GEMINI_API_KEY|GEMINI_MODEL|GEMINI_MODEL_PRO|SUPABASE_SERVICE_ROLE_KEY|SUPABASE_INTERNAL_URL)=' >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
