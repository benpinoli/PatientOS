# Trimmed stack for Choice Healthcare tracker (v1).
# Upstream Supabase docker ties Kong/Studio to analytics — we override those edges.
#
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d db meta auth rest kong

name: supabase

services:
  kong:
    depends_on: !override
      auth:
        condition: service_started
      rest:
        condition: service_started

  studio:
    profiles: ["disabled"]

  realtime:
    profiles: ["disabled"]
  storage:
    profiles: ["disabled"]
  imgproxy:
    profiles: ["disabled"]
  functions:
    profiles: ["disabled"]
  analytics:
    profiles: ["disabled"]
  vector:
    profiles: ["disabled"]
  supavisor:
    profiles: ["disabled"]
  pooler:
    profiles: ["disabled"]
