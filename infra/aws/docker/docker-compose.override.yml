# Trimmed stack for Choice Healthcare tracker (v1).
# Upstream Supabase docker ties Kong/Studio to analytics — we override those edges.
#
# Paperwork AI (Gemini extension) needs object storage, so `storage` + `imgproxy`
# are now enabled. Bring the stack up with:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d db meta auth rest kong storage imgproxy

name: supabase

services:
  kong:
    depends_on: !override
      auth:
        condition: service_started
      rest:
        condition: service_started
      storage:
        condition: service_started

  studio:
    profiles: ["disabled"]

  realtime:
    profiles: ["disabled"]
  functions:
    profiles: ["disabled"]
  analytics:
    profiles: ["disabled"]
  vector:
    profiles: ["disabled"]
  supavisor:
    profiles: ["disabled"]
  pooler:
    profiles: ["disabled"]
